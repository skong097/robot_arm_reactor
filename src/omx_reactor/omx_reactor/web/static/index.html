<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>OMX Reactor — Live Demo</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="omx-header">
    <h1>OMX Reactor</h1>
    <div class="status-bar">
      <span>모션: <b id="current_motion">-</b></span>
      <span>다음: <b id="queued_motion">-</b></span>
      <span class="sep">|</span>
      <span>track: <b id="track">-</b></span>
      <span>source: <b id="source">-</b></span>
    </div>
  </header>

  <main class="omx-main">

    <!-- 감정 분석 — doby_controller modes.html (engaging 섹션) 포팅.
         hidden 제거 — omx_reactor 는 mode 분기 없이 항상 표시.
         손님 라벨 / 미니게임 결과 / 강제 발화 / 최근 이벤트 섹션은 omx_reactor 컨텍스트 무관해 제거. -->
    <section class="card engaging-analytics" id="engaging-analytics">
      <h3>감정 분석
        <span class="muted" id="ea-source">—</span></h3>
      <div class="ea-grid">
        <div class="ea-meta">
          <div class="ea-row">
            <span class="label">valence</span>
            <span class="ea-big v-mid" id="ea-v">—</span>
          </div>
          <div class="ea-row">
            <span class="label">arousal</span>
            <span class="ea-big v-mid" id="ea-a">—</span>
          </div>
          <div class="ea-row">
            <span class="label">confidence</span>
            <span id="ea-conf">—</span>
          </div>
          <div class="ea-conf-bar"><span id="ea-conf-bar" style="width:0%"></span></div>
          <div class="ea-row">
            <span class="label">flags</span>
            <span id="ea-flags" style="font-size:var(--fs-xs)">—</span>
          </div>
        </div>
        <svg class="circumplex" viewBox="-110 -110 220 220" id="ea-circumplex">
          <rect class="abort-zone" x="-100" y="-100" width="50" height="60"></rect>
          <line class="axis" x1="-100" y1="0" x2="100" y2="0"></line>
          <line class="axis" x1="0" y1="-100" x2="0" y2="100"></line>
          <line class="grid" x1="-100" y1="-50" x2="100" y2="-50"></line>
          <line class="grid" x1="-100" y1="50" x2="100" y2="50"></line>
          <line class="grid" x1="-50" y1="-100" x2="-50" y2="100"></line>
          <line class="grid" x1="50" y1="-100" x2="50" y2="100"></line>
          <rect x="-100" y="-100" width="200" height="200" fill="none"
                stroke="rgba(255,102,179,0.18)" stroke-width="0.5"></rect>
          <text class="quad-label" x="92" y="-3" text-anchor="end">V+</text>
          <text class="quad-label" x="-92" y="-3" text-anchor="start">V-</text>
          <text class="quad-label" x="3" y="-92" text-anchor="start">A+</text>
          <text class="quad-label" x="3" y="98" text-anchor="start">A-</text>
          <text class="quad-label" x="-90" y="-85">angry/abort</text>
          <text class="quad-label" x="55" y="-85">excited</text>
          <text class="quad-label" x="-90" y="92">sad/bored</text>
          <text class="quad-label" x="55" y="92">calm/happy</text>
          <g id="ea-traj"></g>
          <circle class="cur-pt" id="ea-cur" cx="0" cy="0" r="0"></circle>
        </svg>
      </div>

      <h4 class="card__subtitle">라포 이벤트</h4>
      <div class="ea-rap-counters">
        <div class="ea-rap-counter up">
          <div class="num" id="ea-rap-up">0</div>
          <div class="lbl">engagement_up</div>
        </div>
        <div class="ea-rap-counter down">
          <div class="num" id="ea-rap-down">0</div>
          <div class="lbl">engagement_down</div>
        </div>
        <div class="ea-rap-counter abrt">
          <div class="num" id="ea-rap-abort">0</div>
          <div class="lbl">abort_trigger</div>
        </div>
        <div class="ea-rap-counter neut">
          <div class="num" id="ea-rap-neut">0</div>
          <div class="lbl">neutral_continue</div>
        </div>
      </div>
      <div class="ea-rap-recent" id="ea-rap-recent">
        <div class="ev-neut">(아직 이벤트 없음)</div>
      </div>

      <h4 class="card__subtitle">시계열 추이 (최근 1분)</h4>
      <engagement-timeline id="ea-timeline"></engagement-timeline>
    </section>

    <!-- 오른쪽 column — OMX Gazebo view + 모션 이벤트 -->
    <section class="card omx-right">
      <h3>OMX 모션</h3>
      <div class="omx-gazebo-view">
        <img id="gazebo-view-img" src="/api/gazebo_view.mjpg" alt="OMX Gazebo view" />
      </div>

      <h4 class="card__subtitle">모션 이벤트 (현재 상태 + 로봇 모션 ID)</h4>
      <ul class="omx-motion-list" id="motion-events">
        <li class="muted">(모션 발사 시 기록)</li>
      </ul>
    </section>

  </main>

  <!-- omx_reactor — vendored engaging-analytics.js 의 init() 이 window.store.get('mode')==='engaging'
       일 때만 ws.open() 호출. omx 환경엔 store 없어 ws 연결 안 됨 → 점/추이/라포 갱신 X.
       mode='engaging' 항상 반환하는 minimal store mock 으로 ws 자동 연결 강제. -->
  <script>
    window.store = {
      _handlers: {},
      on: function (event, cb) {
        (this._handlers[event] = this._handlers[event] || []).push(cb);
        if (event === 'mode') cb({ current: 'engaging' });
      },
      get: function (key) {
        return key === 'mode' ? { current: 'engaging' } : null;
      },
    };
  </script>

  <!-- vendored doby web component + analytics + omx adapter -->
  <script src="/static/engagement-timeline.js"></script>
  <script src="/static/engaging-analytics.js"></script>
  <script src="/static/app.js"></script>

</body>
</html>
